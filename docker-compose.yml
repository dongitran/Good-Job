services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: goodjob-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goodjob
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goodjob-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:20-alpine
    container_name: goodjob-api
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_URL: ${APP_URL:-http://localhost:5174}
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/goodjob}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-test-secret}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY:-dev-oauth-token-encryption-key-32-char}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-local-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-local-google-client-secret}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/api/auth/google/callback}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-test-gemini-key}
      DEFAULT_MONTHLY_BUDGET: ${DEFAULT_MONTHLY_BUDGET:-1000}
      DEFAULT_MIN_POINTS: ${DEFAULT_MIN_POINTS:-1}
      DEFAULT_MAX_POINTS: ${DEFAULT_MAX_POINTS:-100}
      AUTH_ALLOW_DEV_TOKEN_ISSUE: ${AUTH_ALLOW_DEV_TOKEN_ISSUE:-true}
      RESEND_TOKEN: ${RESEND_TOKEN:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    volumes:
      - ./:/workspace
    command: sh -c "npm install && npm run dev:api"
    ports:
      - "3000:3000"

  web:
    image: node:20-alpine
    container_name: goodjob-web
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: ${WEB_NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:3000}
    volumes:
      - ./:/workspace
    command: sh -c "npm install && npm run dev -w apps/web -- --host 0.0.0.0 --port 5173"
    ports:
      - "5174:5173"

volumes:
  pgdata:
