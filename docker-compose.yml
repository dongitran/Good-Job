services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: goodjob-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goodjob
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goodjob-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:20-alpine
    container_name: goodjob-api
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_URL: http://localhost:5174
      API_PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/goodjob
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: test-secret
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
      DEFAULT_MONTHLY_BUDGET: 1000
      DEFAULT_MIN_POINTS: 1
      DEFAULT_MAX_POINTS: 100
      GEMINI_API_KEY: test-gemini-key
      AUTH_ALLOW_DEV_TOKEN_ISSUE: "true"
    volumes:
      - ./:/workspace
    command: sh -c "npm install && npm run dev:api"
    ports:
      - "3000:3000"

  web:
    image: node:20-alpine
    container_name: goodjob-web
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000/api
    volumes:
      - ./:/workspace
    command: sh -c "npm install && npm run dev -w apps/web -- --host 0.0.0.0 --port 5173"
    ports:
      - "5174:5173"

volumes:
  pgdata:
