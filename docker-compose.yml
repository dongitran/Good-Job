services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: goodjob-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goodjob
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goodjob-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.local
    container_name: goodjob-api
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./apps/web:/app/apps/web
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.local
    container_name: goodjob-web
    restart: unless-stopped
    working_dir: /app
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000/api
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./apps/web:/app/apps/web
    command: sh -c "cd /app/apps/web && /app/node_modules/.bin/vite --host 0.0.0.0 --port 5173"
    ports:
      - "5174:5173"

volumes:
  pgdata:
