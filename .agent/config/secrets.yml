repo: dongitran/Good-Job
environment: null
type: secret

secrets:
  # Pulumi Cloud access token for state management
  # Bitwarden: Pulumi/
  - name: PULUMI_ACCESS_TOKEN
    bitwarden: PULUMI_ACCESS_TOKEN_GCP_INFRA
  
  # Amanotes application database connection URL
  # Bitwarden: amanotes/
  - name: APP_DATABASE_URL
    bitwarden: AMANOTES_APP_DATABASE_URL
  
  # Application base URL
  # Bitwarden: amanotes/
  - name: BASE_URL
    bitwarden: AMANOTES_BASE_URL
  
  # Redis connection URL
  # Bitwarden: Google Cloud Platform/
  - name: REDIS_URL
    bitwarden: GCP_INFRA_REDIS_URL
  
  # JWT secret for token signing
  # Bitwarden: amanotes/
  - name: JWT_SECRET
    bitwarden: AMANOTES_JWT_SECRET
  
  # JWT refresh token secret
  # Bitwarden: amanotes/
  - name: JWT_REFRESH_SECRET
    bitwarden: AMANOTES_JWT_REFRESH_SECRET
  
  # Google OAuth redirect URI
  # Bitwarden: amanotes/
  - name: GOOGLE_REDIRECT_URI
    bitwarden: AMANOTES_GOOGLE_REDIRECT_URI
  
  # OAuth token encryption key
  # Bitwarden: amanotes/
  - name: OAUTH_TOKEN_ENCRYPTION_KEY
    bitwarden: AMANOTES_OAUTH_TOKEN_ENCRYPTION_KEY
  
  # Google OAuth client ID
  # Bitwarden: Google Cloud Platform/
  - name: GOOGLE_CLIENT_ID
    bitwarden: GCP_INFRA_GOOGLE_CLIENT_ID_THIENDONG_IUH
  
  # Google OAuth client secret
  # Bitwarden: Google Cloud Platform/
  - name: GOOGLE_CLIENT_SECRET
    bitwarden: GCP_INFRA_GOOGLE_CLIENT_SECRET_THIENDONG_IUH
  
  # Gemini API keys (comma-separated list)
  # Bitwarden: Google Cloud Platform/
  - name: GEMINI_API_KEYS
    bitwarden: GCP_INFRA_GEMINI_API_KEYS
  
  # GCP service account credentials for GitHub Actions
  # Bitwarden: Google Cloud Platform/
  - name: GCP_CREDENTIALS
    bitwarden: GCP_SERVICE_ACCOUNT_1
  
  # GCP project ID for infrastructure deployment
  # Bitwarden: Google Cloud Platform/
  - name: GCP_PROJECT_ID
    bitwarden: GCP_INFRA_PROJECT_ID_1
  
  # GCP load balancer IP address
  # Bitwarden: Google Cloud Platform/
  - name: GCP_LOAD_BALANCER_IP
    bitwarden: GCP_INFRA_LOAD_BALANCER_IP_1
  
  # Telegram bot token for GitHub Actions notifications
  # Bitwarden: Telegram/
  - name: TELEGRAM_BOT_TOKEN
    bitwarden: TELEGRAM_GITHUB_ACTION_NOTI_TOKEN
  
  # Telegram chat ID for notification delivery
  # Bitwarden: Telegram/
  - name: TELEGRAM_CHAT_ID
    bitwarden: TELEGRAM_DONGTRAN_CHAT_ID

  # Resend API token for email sending
  # Bitwarden: Token/
  - name: RESEND_TOKEN
    bitwarden: RESEND_TOKEN
  
  # Admin email address
  # Bitwarden: amanotes/
  - name: ADMIN_EMAIL
    bitwarden: AMANOTES_ADMIN_EMAIL

  # E2E test database URL (external NodePort for GitHub Actions)
  # Bitwarden: amanotes/
  - name: E2E_DATABASE_URL
    bitwarden: AMANOTES_E2E_DATABASE_URL

  # E2E API base URL (direct API subdomain for Playwright tests)
  # Bitwarden: amanotes/
  - name: E2E_API_BASE_URL
    bitwarden: AMANOTES_E2E_API_BASE_URL

  # Email domains to skip verification (comma-separated)
  # Bitwarden: amanotes/
  - name: EMAIL_SKIP_DOMAINS
    bitwarden: AMANOTES_EMAIL_SKIP_DOMAINS

  # GCP GCS project ID for file uploads
  # Bitwarden: amanotes/
  - name: GCP_GCS_PROJECT_ID
    bitwarden: GOODJOB_GCP_GCS_PROJECT_ID

  # GCP GCS service account credentials for file uploads
  # Bitwarden: amanotes/
  - name: GCP_GCS_CREDENTIALS
    bitwarden: GOODJOB_GCP_GCS_CREDENTIAL_JSON
