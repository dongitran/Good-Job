<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Good Job - Sign Up / Sign In</title>
    <meta content="Join Good Job — the modern employee recognition & reward platform." name="description" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'amanotes-purple': '#7C3AED',
                        'amanotes-blue': '#3B82F6',
                        'amanotes-pink': '#EC4899',
                        'amanotes-orange': '#F97316',
                        'amanotes-cyan': '#06B6D4',
                        'amanotes-green': '#10B981',
                        'amanotes-yellow': '#F59E0B',
                        'amanotes-dark': '#0F172A',
                        'amanotes-dark-light': '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Poppins', 'system-ui', 'sans-serif'],
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                        '4xl': '2rem',
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Poppins', sans-serif;
        }

        .gradient-primary {
            background: linear-gradient(135deg, #7C3AED 0%, #3B82F6 100%);
        }

        .gradient-text {
            background: linear-gradient(135deg, #7C3AED 0%, #EC4899 50%, #F97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .animated-gradient {
            background: linear-gradient(135deg, #7C3AED 0%, #EC4899 25%, #3B82F6 50%, #F97316 75%, #7C3AED 100%);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.60);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        .btn-magnetic {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-magnetic:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.4);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-enter {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .backdrop-enter {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(2deg);
            }
        }

        @keyframes floatSlow {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .float {
            animation: float 6s ease-in-out infinite;
        }

        .float-delayed {
            animation: float 6s ease-in-out infinite;
            animation-delay: 2s;
        }

        .float-slow {
            animation: floatSlow 8s ease-in-out infinite;
        }

        .tab-indicator {
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-input {
            transition: all 0.25s ease;
        }

        .form-input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .strength-bar {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.5s ease;
        }

        .social-btn {
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        @keyframes checkmark {
            0% {
                stroke-dashoffset: 24;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        .password-toggle {
            transition: all 0.2s ease;
        }

        .password-toggle:hover {
            color: #7C3AED;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 58, 237, 0.4);
        }
    </style>
</head>

<body class="bg-amanotes-dark text-slate-900 antialiased overflow-hidden h-screen">

    <!-- ==================== BACKGROUND (Blurred Landing Page Feel) ==================== -->

        <div

        </div>
        <div class="absolute bottom-1/4 left-1/4 w-[300px] h-[300px] bg-amanotes-orange/15 rounded-full blur-[80px]">

        <div class="absolute w-12 h-12 bg-amanotes-pink rounded-2xl opacity-30 float-delayed" style="left:88%;top:12%">
        </div>
        <div class="absolute w-20 h-20 bg-amanotes-orange rounded-2xl opacity-25 float-slow" style="left:78%;top:72%">
        </div>
        <div class="absolute w-14 h-14 bg-amanotes-cyan rounded-2xl opacity-30 float"
            style="left:3%;top:65%;animation-delay:1.5s"></div>
        <div class="absolute w-10 h-10 bg-amanotes-blue rounded-2xl opacity-30 float-delayed" style="left:92%;top:48%">
        </div>

    <!-- ==================== BACKDROP OVERLAY ==================== -->

    <!-- ==================== MODAL ==================== -->

        <div class="modal-enter relative w-full max-w-md">

            <!-- Modal Card -->
            <div class="relative bg-white rounded-3xl shadow-2xl shadow-purple-500/20 overflow-hidden">

                <!-- Close Button -->
                <button onclick="window.location.href='../00-landing-page/index.html'" id="closeBtn"

                    </svg>

                <!-- Header with Logo -->

                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />

                <!-- Tab Switcher -->

                        <button id="signinTab" onclick="switchTab('signin')"

                            Sign In
                        </button>
                    </div>
                </div>

                <!-- Forms Container -->
                <div class="relative overflow-hidden" style="min-height: 420px;">

                    <!-- ========== SIGN UP FORM ========== -->
                    <div id="signupForm" class="px-8 pt-6 pb-8 transition-all duration-400 ease-out">

                            <div class="relative">

                                        <path stroke-linecap="round" stroke-linejoin="round"

                                    </svg>
                                </div>
                                <input type="text" placeholder="John Doe"

                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>

                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">

                                    </svg>
                                </div>

                                <button type="button" onclick="togglePassword('signupPassword', 'eyeIcon1')"

                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </div>
                                </div>
                                <span class="text-xs text-slate-500 leading-relaxed">I agree to the <a href="#"

                                        Policy</a></span>

                            <div class="relative flex justify-center">
                                <span class="bg-white px-3 text-xs text-slate-400 font-medium">or continue with</span>
                            </div>
                        </div>

                        <!-- Social Login Buttons -->
                        <div class="mb-5">
                            <button
                                class="social-btn w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-white border border-slate-200 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50">

                                <button type="button" onclick="togglePassword('signinPassword', 'eyeIcon2')"

                                    <svg id="eyeIcon2" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.573-3.007-9.963-7.178z" />
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Remember me & Forgot -->
                        <div class="flex items-center justify-between mb-6">
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <div class="relative">
                                    <input type="checkbox" class="sr-only peer" checked />
                                    <div
                                        class="w-[18px] h-[18px] border-2 border-slate-300 rounded-md peer-checked:border-amanotes-purple peer-checked:bg-amanotes-purple transition-all duration-200 flex items-center justify-center group-hover:border-amanotes-purple/50">
                                        <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24"
                                            stroke="currentColor" stroke-width="3">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </div>
                                </div>
                                <span class="text-xs text-slate-600 font-medium">Remember me</span>
                            </label>
                            <button onclick="showForgotPassword()"
                                class="text-xs text-amanotes-purple font-semibold hover:underline">Forgot
                                password?</button>
                        </div>

                        <!-- Submit Button -->
                        <button onclick="showSigninSuccess()"
                            class="w-full gradient-primary text-white font-semibold py-3.5 rounded-xl btn-magnetic text-sm flex items-center justify-center gap-2">
                            Sign In
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                            </svg>
                        </button>

                        <!-- Divider -->
                        <div class="relative my-5">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-slate-200"></div>
                            </div>
                            <div class="relative flex justify-center">
                                <span class="bg-white px-3 text-xs text-slate-400 font-medium">or continue with</span>
                            </div>
                        </div>

                        <!-- Social Login Buttons -->
                        <div class="mb-5">
                            <button
                                class="social-btn w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-white border border-slate-200 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50">
                                <svg class="w-5 h-5" viewBox="0 0 24 24">
                                    <path fill="#4285F4"
                                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                                    <path fill="#34A853"
                                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                    <path fill="#FBBC05"
                                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                    <path fill="#EA4335"
                                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                                </svg>
                                Continue with Google
                            </button>
                        </div>

                        <!-- Footer -->
                        <p class="text-center text-xs text-slate-500">
                            Don't have an account?
                            <button onclick="switchTab('signup')"
                                class="text-amanotes-purple font-semibold hover:underline">Sign Up</button>
                        </p>
                    </div>

                    <!-- ========== FORGOT PASSWORD FORM ========== -->
                    <div id="forgotForm"
                        class="px-8 pt-6 pb-8 transition-all duration-400 ease-out absolute inset-x-0 top-0"
                        style="opacity: 0; transform: translateX(40px); pointer-events: none;">
                        <div class="text-center mb-6">
                            <div
                                class="w-14 h-14 bg-purple-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <svg class="w-7 h-7 text-amanotes-purple" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                                </svg>
                            </div>
                            <h3 class="font-display font-semibold text-lg text-amanotes-dark mb-1">Reset your password
                            </h3>
                            <p class="text-sm text-slate-500">Enter your email and we'll send you a reset link</p>
                        </div>

                        <div class="mb-5">
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <svg class="w-4.5 h-4.5 text-slate-400" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                                    </svg>
                                </div>
                                <input type="email" placeholder="john@company.com"
                                    class="form-input w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-amanotes-dark placeholder:text-slate-400 focus:outline-none focus:bg-white" />
                            </div>
                        </div>

                        <button
                            class="w-full gradient-primary text-white font-semibold py-3.5 rounded-xl btn-magnetic text-sm mb-4">
                            Send Reset Link
                        </button>

                        <button onclick="showForgotPasswordBack()"
                            class="w-full text-center text-sm text-slate-500 hover:text-amanotes-purple font-medium transition-colors flex items-center justify-center gap-1">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            Back to Sign In
                        </button>
                    </div>

                </div>

                <!-- Trial badge -->
                <div class="bg-gradient-to-r from-purple-50 to-pink-50 px-8 py-3 border-t border-purple-100/50">
                    <p class="text-xs text-center text-slate-500 flex items-center justify-center gap-1.5">
                        <svg class="w-3.5 h-3.5 text-amanotes-purple" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                        <span>Free 14-day Pro trial · No credit card required</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== SUCCESS TOAST ==================== -->
    <div id="successToast"
        class="fixed top-6 left-1/2 -translate-x-1/2 z-50 opacity-0 pointer-events-none transition-all duration-500"
        style="transform: translate(-50%, -20px);">
        <div
            class="bg-white rounded-2xl shadow-2xl shadow-green-500/20 border border-green-100 px-6 py-4 flex items-center gap-3">
            <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <div>
                <p id="toastTitle" class="text-sm font-semibold text-amanotes-dark">Account created! 🎉</p>
                <p id="toastSubtitle" class="text-xs text-slate-500">Redirecting to onboarding...</p>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'signup';

        function switchTab(tab) {
            if (tab === currentTab) return;
            currentTab = tab;

            const indicator = document.getElementById('tabIndicator');
            const signupTab = document.getElementById('signupTab');
            const signinTab = document.getElementById('signinTab');
            const signupForm = document.getElementById('signupForm');
            const signinForm = document.getElementById('signinForm');
            const forgotForm = document.getElementById('forgotForm');

            // Hide forgot form
            forgotForm.style.opacity = '0';
            forgotForm.style.transform = 'translateX(40px)';
            forgotForm.style.pointerEvents = 'none';

            if (tab === 'signup') {
                indicator.style.left = '4px';
                signupTab.className = signupTab.className.replace('text-slate-500', 'text-amanotes-purple');
                signinTab.className = signinTab.className.replace('text-amanotes-purple', 'text-slate-500');

                signupForm.style.opacity = '1';
                signupForm.style.transform = 'translateX(0)';
                signupForm.style.pointerEvents = 'auto';
                signupForm.style.position = 'relative';

                signinForm.style.opacity = '0';
                signinForm.style.transform = 'translateX(40px)';
                signinForm.style.pointerEvents = 'none';
                signinForm.style.position = 'absolute';
            } else {
                indicator.style.left = 'calc(50%)';
                signinTab.className = signinTab.className.replace('text-slate-500', 'text-amanotes-purple');
                signupTab.className = signupTab.className.replace('text-amanotes-purple', 'text-slate-500');

                signinForm.style.opacity = '1';
                signinForm.style.transform = 'translateX(0)';
                signinForm.style.pointerEvents = 'auto';
                signinForm.style.position = 'relative';

                signupForm.style.opacity = '0';
                signupForm.style.transform = 'translateX(-40px)';
                signupForm.style.pointerEvents = 'none';
                signupForm.style.position = 'absolute';
            }
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
            }
        }

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const colors = ['#EF4444', '#F97316', '#EAB308', '#10B981'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];

            for (let i = 1; i <= 4; i++) {
                const bar = document.getElementById('strengthBar' + i);
                if (i <= strength) {
                    bar.style.width = '100%';
                    bar.style.backgroundColor = colors[strength - 1];
                } else {
                    bar.style.width = '0%';
                    bar.style.backgroundColor = '#E2E8F0';
                }
            }

            const text = document.getElementById('strengthText');
            if (password.length === 0) {
                text.textContent = '';
                text.style.color = '#94A3B8';
            } else {
                text.textContent = labels[strength - 1] || 'Weak';
                text.style.color = colors[strength - 1] || colors[0];
            }
        }

        function showForgotPassword() {
            const signinForm = document.getElementById('signinForm');
            const forgotForm = document.getElementById('forgotForm');

            signinForm.style.opacity = '0';
            signinForm.style.transform = 'translateX(-40px)';
            signinForm.style.pointerEvents = 'none';

            setTimeout(() => {
                forgotForm.style.opacity = '1';
                forgotForm.style.transform = 'translateX(0)';
                forgotForm.style.pointerEvents = 'auto';
            }, 150);
        }

        function showForgotPasswordBack() {
            const signinForm = document.getElementById('signinForm');
            const forgotForm = document.getElementById('forgotForm');

            forgotForm.style.opacity = '0';
            forgotForm.style.transform = 'translateX(40px)';
            forgotForm.style.pointerEvents = 'none';

            setTimeout(() => {
                signinForm.style.opacity = '1';
                signinForm.style.transform = 'translateX(0)';
                signinForm.style.pointerEvents = 'auto';
            }, 150);
        }

        function showToast(title, subtitle) {
            const toast = document.getElementById('successToast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastSubtitle').textContent = subtitle;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            toast.style.pointerEvents = 'auto';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                toast.style.pointerEvents = 'none';
            }, 3000);
        }

        function showSignupSuccess() {
            showToast('Account created! 🎉', 'Redirecting to onboarding...');
        }

        function showSigninSuccess() {
            showToast('Welcome back! 👋', 'Redirecting to dashboard...');
        }
    </script>

</body>

</html>
