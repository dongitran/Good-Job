name: Deploy Apps to GKE

on:
  push:
    branches: [master]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/infra/**"
      - ".github/workflows/deploy-apps.yml"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: deploy-apps
  cancel-in-progress: false

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
  PULUMI_CONFIG_PASSPHRASE: ""
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPOSITORY: apps
  STACK: dongitran/good-job-infra/dev

jobs:
  build-and-deploy:
    name: Build images & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -----------------------------------------------------------------------
      # 2. Authenticate to GCP
      # -----------------------------------------------------------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # gke-gcloud-auth-plugin is needed by the Kubernetes provider when
      # kubeconfig uses exec-based authentication (standard GKE pattern)
      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      # -----------------------------------------------------------------------
      # 3. Configure Docker for Artifact Registry & create repo if needed
      # -----------------------------------------------------------------------
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Create Artifact Registry repository (idempotent)
        run: |
          gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Application Docker images" \
            --quiet 2>/dev/null || echo "Repository already exists"

      # -----------------------------------------------------------------------
      # 4. Detect changed files to optimize builds
      # -----------------------------------------------------------------------
      - name: Detect changed files
        id: changes
        run: |
          # For first commit or force push, build everything
          if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
            echo "api_changed=true" >> "$GITHUB_OUTPUT"
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
            echo "First commit - building all images"
            exit 0
          fi

          # Check if API code changed
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E "^apps/api/" > /dev/null; then
            echo "api_changed=true" >> "$GITHUB_OUTPUT"
            echo "API code changed - will rebuild API image"
          else
            echo "api_changed=false" >> "$GITHUB_OUTPUT"
            echo "API code unchanged - checking if previous image exists"
          fi

          # Check if Web code changed
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E "^apps/web/" > /dev/null; then
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
            echo "Web code changed - will rebuild Web image"
          else
            echo "web_changed=false" >> "$GITHUB_OUTPUT"
            echo "Web code unchanged - checking if previous image exists"
          fi

      # -----------------------------------------------------------------------
      # 5. Check if images exist in Artifact Registry
      # -----------------------------------------------------------------------
      - name: Check if images exist in registry
        id: build_strategy
        run: |
          IMAGE_TAG="${{ github.sha }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}"

          # Check API image in registry
          if [ "${{ steps.changes.outputs.api_changed }}" == "true" ]; then
            echo "build_api=true" >> "$GITHUB_OUTPUT"
            echo "API code changed - will rebuild"
          elif gcloud artifacts docker images describe "${REGISTRY}/api:${IMAGE_TAG}" --format="get(name)" 2>/dev/null; then
            echo "build_api=false" >> "$GITHUB_OUTPUT"
            echo "API image ${IMAGE_TAG} exists in registry - will reuse"
          else
            echo "build_api=true" >> "$GITHUB_OUTPUT"
            echo "API image ${IMAGE_TAG} not found in registry - will build"
          fi

          # Check Web image in registry
          if [ "${{ steps.changes.outputs.web_changed }}" == "true" ]; then
            echo "build_web=true" >> "$GITHUB_OUTPUT"
            echo "Web code changed - will rebuild"
          elif gcloud artifacts docker images describe "${REGISTRY}/web:${IMAGE_TAG}" --format="get(name)" 2>/dev/null; then
            echo "build_web=false" >> "$GITHUB_OUTPUT"
            echo "Web image ${IMAGE_TAG} exists in registry - will reuse"
          else
            echo "build_web=true" >> "$GITHUB_OUTPUT"
            echo "Web image ${IMAGE_TAG} not found in registry - will build"
          fi

      # -----------------------------------------------------------------------
      # 6. Build & push Docker images (conditional)
      # -----------------------------------------------------------------------
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        if: steps.build_strategy.outputs.build_api == 'true'
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ steps.tag.outputs.IMAGE_TAG }} \
            -f apps/api/Dockerfile \
            .

      - name: Push API image
        if: steps.build_strategy.outputs.build_api == 'true'
        run: |
          docker push \
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Build Web image
        if: steps.build_strategy.outputs.build_web == 'true'
        run: |
          docker build \
            --build-arg VITE_API_URL=https://api.good-job.xyz/api \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/web:${{ steps.tag.outputs.IMAGE_TAG }} \
            -f apps/web/Dockerfile \
            .

      - name: Push Web image
        if: steps.build_strategy.outputs.build_web == 'true'
        run: |
          docker push \
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/web:${{ steps.tag.outputs.IMAGE_TAG }}

      # -----------------------------------------------------------------------
      # 7. Set up Pulumi and configure stack
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      - name: Install infra dependencies
        run: npm install --ignore-scripts
        working-directory: apps/infra

      - name: Ensure Pulumi stack exists
        run: pulumi stack select ${{ env.STACK }} 2>/dev/null || pulumi stack init ${{ env.STACK }}
        working-directory: apps/infra

      - name: Set image tags in Pulumi config
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}"

          pulumi config set apiImage "${REGISTRY}/api:${IMAGE_TAG}" --stack ${{ env.STACK }}
          pulumi config set webImage "${REGISTRY}/web:${IMAGE_TAG}" --stack ${{ env.STACK }}

          echo "Set apiImage: ${REGISTRY}/api:${IMAGE_TAG}"
          echo "Set webImage: ${REGISTRY}/web:${IMAGE_TAG}"
        working-directory: apps/infra

      # -----------------------------------------------------------------------
      # 8. Set app secrets in Pulumi config (only when secret is provided)
      #    These are stored encrypted in Pulumi Cloud, so re-setting them on
      #    every run is idempotent and safe.
      # -----------------------------------------------------------------------
      - name: Set app secrets in Pulumi config
        run: |
          pulumi config set --secret databaseUrl "$DATABASE_URL" --stack ${{ env.STACK }}
          pulumi config set --secret redisUrl "$REDIS_URL" --stack ${{ env.STACK }}
          pulumi config set --secret jwtSecret "$JWT_SECRET" --stack ${{ env.STACK }}
          pulumi config set --secret jwtRefreshSecret "$JWT_REFRESH_SECRET" --stack ${{ env.STACK }}
          pulumi config set --secret googleClientId "$GOOGLE_CLIENT_ID" --stack ${{ env.STACK }}
          pulumi config set --secret googleClientSecret "$GOOGLE_CLIENT_SECRET" --stack ${{ env.STACK }}
          pulumi config set --secret googleRedirectUri "$GOOGLE_REDIRECT_URI" --stack ${{ env.STACK }}
          pulumi config set --secret geminiApiKeys "$GEMINI_API_KEYS" --stack ${{ env.STACK }}
          pulumi config set --secret oauthTokenEncryptionKey "$OAUTH_TOKEN_ENCRYPTION_KEY" --stack ${{ env.STACK }}
          pulumi config set --secret resendToken "$RESEND_TOKEN" --stack ${{ env.STACK }}
          pulumi config set --secret adminEmail "$ADMIN_EMAIL" --stack ${{ env.STACK }}
        working-directory: apps/infra
        env:
          DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          OAUTH_TOKEN_ENCRYPTION_KEY: ${{ secrets.OAUTH_TOKEN_ENCRYPTION_KEY }}
          RESEND_TOKEN: ${{ secrets.RESEND_TOKEN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

      # -----------------------------------------------------------------------
      # 9. Deploy with Pulumi
      # -----------------------------------------------------------------------
      - name: Refresh Pulumi state
        run: pulumi refresh --yes --stack ${{ env.STACK }}
        working-directory: apps/infra

      - name: Deploy to GKE
        run: pulumi up --yes --stack ${{ env.STACK }}
        working-directory: apps/infra
        continue-on-error: true
        id: deploy

      - name: Debug API pod logs (if deploy failed)
        if: steps.deploy.outcome == 'failure'
        run: |
          CLUSTER_NAME=$(gcloud container clusters list --format='value(name)' --limit=1)
          CLUSTER_ZONE=$(gcloud container clusters list --format='value(location)' --limit=1)
          gcloud container clusters get-credentials "$CLUSTER_NAME" --zone "$CLUSTER_ZONE"
          echo "=== Pod status ==="
          kubectl get pods -n apps
          echo "=== API pod logs ==="
          kubectl logs -n apps -l app=api --tail=100 || true
          echo "=== API pod describe ==="
          kubectl describe pod -n apps -l app=api | tail -40 || true

      - name: Fail if deploy failed
        if: steps.deploy.outcome == 'failure'
        run: exit 1

      # -----------------------------------------------------------------------
      # 10. Get external IP and notify
      # -----------------------------------------------------------------------
      - name: Get Ingress external IP
        id: ingress
        run: |
          # Wait up to 90s for the ingress to get an external IP assigned
          for i in $(seq 1 18); do
            INGRESS_IP=$(kubectl get ingress apps-ingress \
              -n apps \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$INGRESS_IP" ]; then
              echo "INGRESS_IP=$INGRESS_IP" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Waiting for Ingress IP... ($i/18)"
            sleep 5
          done
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Send Telegram notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [ "$STATUS" != "success" ]; then EMOJI="❌"; fi

          MESSAGE="${EMOJI} *App Deploy ${STATUS}*
          Branch: \`${{ github.ref_name }}\`
          Commit: \`${{ github.sha }}\`
          Actor: ${{ github.actor }}
          Message: ${{ github.event.head_commit.message }}

          *Images*
          API: \`${{ steps.tag.outputs.IMAGE_TAG }}\`
          Web: \`${{ steps.tag.outputs.IMAGE_TAG }}\`

          *Endpoints*
          API: http://${{ steps.ingress.outputs.INGRESS_IP }}/api
          Web: http://${{ steps.ingress.outputs.INGRESS_IP }}"

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" || true
