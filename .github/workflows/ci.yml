name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Type check (API)
        run: npx tsc --noEmit -p apps/api/tsconfig.json
      - name: Type check (Web)
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  api-unit-tests:
    name: API Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Load API test env
        run: |
          while IFS= read -r line; do
            if [ -z "$line" ] || [[ "$line" =~ ^# ]]; then
              continue
            fi
            echo "$line" >> "$GITHUB_ENV"
          done < apps/api/.env.test
      - run: npm run test:api

  api-e2e-tests:
    name: API E2E Tests (Supertest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: goodjob_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Load API test env
        run: |
          while IFS= read -r line; do
            if [ -z "$line" ] || [[ "$line" =~ ^# ]]; then
              continue
            fi
            echo "$line" >> "$GITHUB_ENV"
          done < apps/api/.env.test
      - name: Run migrations
        run: npm run db:migrate
      - name: E2E tests
        run: npm run test:e2e:api

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Unit tests
        run: npm run test:web

  test-web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify BASE_URL is accessible
        run: |
          echo "Testing connection to ${{ secrets.BASE_URL }}"
          curl -f -s -o /dev/null -w "HTTP Status: %{http_code}\n" ${{ secrets.BASE_URL }} || echo "Warning: BASE_URL may not be accessible"
      - name: E2E tests
        env:
          E2E_BASE_URL: ${{ secrets.BASE_URL }}
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
        run: npm run test:e2e:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          if-no-files-found: ignore

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-typecheck, api-unit-tests, api-e2e-tests, test-web, test-web-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build:api
      - run: npm run build:web
        env:
          VITE_API_PROXY_TARGET: http://127.0.0.1:3000
          VITE_API_URL: /api
