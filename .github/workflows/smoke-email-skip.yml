name: Smoke — Verify Email Skip

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Run signup test (check Resend after)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            apps/e2e/node_modules
            apps/infra/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile
        if: steps.cache-nm.outputs.cache-hit != 'true'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run signup test (triggers verification email)
        env:
          E2E_BASE_URL: ${{ secrets.BASE_URL }}
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
        run: >
          pnpm --filter e2e run test
          tests/auth-email.spec.ts
          --grep "signup -> verify email -> signin"
          --project=chromium-desktop
          --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          if-no-files-found: ignore
