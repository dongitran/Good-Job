name: Deploy Infrastructure to GKE

on:
  push:
    branches: [master]
    paths:
      - "apps/infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

concurrency:
  group: deploy-infra
  cancel-in-progress: false

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
  PULUMI_CONFIG_PASSPHRASE: ""
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPOSITORY: apps
  STACK: dongitran/good-job-infra/dev

jobs:
  deploy-infra:
    name: Deploy infrastructure only
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Authenticate to GCP
      # -----------------------------------------------------------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # gke-gcloud-auth-plugin is needed by the Kubernetes provider
      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      # -----------------------------------------------------------------------
      # 3. Set up Node.js for Pulumi
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      - name: Install infra dependencies
        run: npm install --ignore-scripts
        working-directory: apps/infra

      - name: Ensure Pulumi stack exists
        run: pulumi stack select ${{ env.STACK }} 2>/dev/null || pulumi stack init ${{ env.STACK }}
        working-directory: apps/infra

      # -----------------------------------------------------------------------
      # 4. Get current image tags from Pulumi config (don't rebuild images)
      # -----------------------------------------------------------------------
      - name: Get current image tags
        id: images
        run: |
          API_IMAGE=$(pulumi config get apiImage --stack ${{ env.STACK }} 2>/dev/null || echo "")
          WEB_IMAGE=$(pulumi config get webImage --stack ${{ env.STACK }} 2>/dev/null || echo "")

          if [ -z "$API_IMAGE" ] || [ -z "$WEB_IMAGE" ]; then
            echo "Error: Image tags not found in Pulumi config."
            echo "Please run deploy-apps workflow first to build and push initial images."
            exit 1
          fi

          echo "API_IMAGE=$API_IMAGE" >> "$GITHUB_OUTPUT"
          echo "WEB_IMAGE=$WEB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Using existing API image: $API_IMAGE"
          echo "Using existing Web image: $WEB_IMAGE"
        working-directory: apps/infra

      # -----------------------------------------------------------------------
      # 5. Set app secrets in Pulumi config
      # -----------------------------------------------------------------------
      - name: Set app secrets in Pulumi config
        run: |
          pulumi config set --secret databaseUrl "$DATABASE_URL" --stack ${{ env.STACK }}
          pulumi config set --secret redisUrl "$REDIS_URL" --stack ${{ env.STACK }}
          pulumi config set --secret jwtSecret "$JWT_SECRET" --stack ${{ env.STACK }}
          pulumi config set --secret jwtRefreshSecret "$JWT_REFRESH_SECRET" --stack ${{ env.STACK }}
          pulumi config set --secret googleClientId "$GOOGLE_CLIENT_ID" --stack ${{ env.STACK }}
          pulumi config set --secret googleClientSecret "$GOOGLE_CLIENT_SECRET" --stack ${{ env.STACK }}
          pulumi config set --secret googleRedirectUri "$GOOGLE_REDIRECT_URI" --stack ${{ env.STACK }}
          pulumi config set --secret geminiApiKeys "$GEMINI_API_KEYS" --stack ${{ env.STACK }}
          pulumi config set --secret oauthTokenEncryptionKey "$OAUTH_TOKEN_ENCRYPTION_KEY" --stack ${{ env.STACK }}
          pulumi config set --secret resendToken "$RESEND_TOKEN" --stack ${{ env.STACK }}
          pulumi config set --secret adminEmail "$ADMIN_EMAIL" --stack ${{ env.STACK }}
        working-directory: apps/infra
        env:
          DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          OAUTH_TOKEN_ENCRYPTION_KEY: ${{ secrets.OAUTH_TOKEN_ENCRYPTION_KEY }}
          RESEND_TOKEN: ${{ secrets.RESEND_TOKEN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

      # -----------------------------------------------------------------------
      # 6. Deploy infrastructure changes with Pulumi
      # -----------------------------------------------------------------------
      - name: Refresh Pulumi state
        run: pulumi refresh --yes --stack ${{ env.STACK }}
        working-directory: apps/infra

      - name: Deploy infrastructure to GKE
        run: pulumi up --yes --stack ${{ env.STACK }}
        working-directory: apps/infra
        id: deploy

      # -----------------------------------------------------------------------
      # 7. Get external IP and notify
      # -----------------------------------------------------------------------
      - name: Get cluster credentials
        run: |
          CLUSTER_NAME=$(gcloud container clusters list --format='value(name)' --limit=1)
          CLUSTER_ZONE=$(gcloud container clusters list --format='value(location)' --limit=1)
          gcloud container clusters get-credentials "$CLUSTER_NAME" --zone "$CLUSTER_ZONE"

      - name: Get Ingress external IP
        id: ingress
        run: |
          # Wait up to 60s for the ingress to get an external IP assigned
          for i in $(seq 1 12); do
            INGRESS_IP=$(kubectl get ingress apps-ingress \
              -n apps \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$INGRESS_IP" ]; then
              echo "INGRESS_IP=$INGRESS_IP" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Waiting for Ingress IP... ($i/12)"
            sleep 5
          done

      - name: Send Telegram notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [ "$STATUS" != "success" ]; then EMOJI="❌"; fi

          MESSAGE="${EMOJI} *Infrastructure Deploy ${STATUS}*
          Branch: \`${{ github.ref_name }}\`
          Commit: \`${{ github.sha }}\`
          Actor: ${{ github.actor }}

          *Current Images (unchanged)*
          API: \`${{ steps.images.outputs.API_IMAGE }}\`
          Web: \`${{ steps.images.outputs.WEB_IMAGE }}\`

          *Endpoints*
          API: https://api.good-job.xyz/api
          Web: https://good-job.xyz"

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" || true
